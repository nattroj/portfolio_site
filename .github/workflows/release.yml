name: Build and Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if .nvmrc exists
        id: nvm-check
        run: |
          if [ -f .nvmrc ]; then
            echo "version=$(cat .nvmrc)" >> $GITHUB_OUTPUT
          else
            echo "version=16" # Keeping Node 16 fallback for OpenSSL compatibility
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.nvm-check.outputs.version }}
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run build
        run: yarn build
        env:
          NODE_OPTIONS: --openssl-legacy-provider

      # NEW STEP: Zip the production build directory so it can be uploaded
      - name: Zip build assets
        run: |
          cd build
          zip -r ../build-artifacts.zip .
          cd ..

      # UPDATED STEP: Tell semantic-release to include the zipped asset
      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          branch: master
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
          # We pass the full configuration as a JSON/YAML string into semantic_release_config
          semantic_release_config: |
            {
              "plugins": [
                "@semantic-release/commit-analyzer",
                "@semantic-release/release-notes-generator",
                "@semantic-release/changelog",
                ["@semantic-release/github", {
                  "assets": [
                    {"path": "build-artifacts.zip", "label": "Production Build"}
                  ]
                }],
                "@semantic-release/git"
              ]
            }
